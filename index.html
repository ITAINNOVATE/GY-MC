<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="/src/assets/dress_1.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GY Maison Couture | Haute Couture Béninoise</title>
    <meta name="description" content="Découvrez l'excellence de la haute couture béninoise avec GY Maison Couture. Des créations uniques alliant tradition et modernité." />
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML += '<div style="color:red; background:#000; padding:20px; z-index:9999; position:absolute; top:0;"><h1>Global Error:</h1><pre>' + event.error?.stack + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color:red; background:#000; padding:20px; z-index:9999; position:absolute; top:0;"><h1>Unhandled Rejection:</h1><pre>' + event.reason + '</pre></div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
